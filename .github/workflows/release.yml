name: Release

# Build the signed release APK + AAB and publish them to a GitHub Release.
# Triggered by pushing a version tag (e.g. v0.1.0), or manually.
#
# Requires these repo secrets (same scheme as halo-android / onlytechs):
#   ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#   PLAY_SERVICE_ACCOUNT_JSON (optional — enables Play internal-track upload)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Restore signing keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > keystore/pocketshell-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/pocketshell-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK + AAB
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Publish to Play Store (internal track)
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: network.ght.pocketshell
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
