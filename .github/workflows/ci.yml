name: CI

# Compile + assemble the debug APK on every push/PR. This is the build gate:
# it proves the Termux terminal engine wires up and the app assembles. The
# unsigned debug APK is uploaded as an artifact for quick on-device testing.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketshell-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  instrumented-test:
    # Real behavioral gate: spawns an actual TermService + shell on a booted
    # emulator and asserts a command's output round-trips. This is the check
    # that would have caught the lateinit-before-assignment hang before it
    # ever reached a tagged release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run instrumented smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: >
            ./gradlew :app:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=network.ght.pocketshell.TerminalSmokeTest
            --no-daemon --stacktrace

  screenshots:
    # Manual-only: walks the app through a few real screens on a booted
    # emulator and uploads what it looked like. UI-coordinate/text automation
    # is more brittle than the smoke test above, so this never gates a push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Capture screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            # Not using `gradlew connectedDebugAndroidTest` here: AGP's task
            # uninstalls both APKs the instant the test run finishes, which
            # raced out any attempt to pull files off the device afterward
            # ("run-as: unknown package"). Installing and driving the
            # instrumentation manually keeps the app installed until we're
            # done pulling.
            ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon --stacktrace
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            adb shell am instrument -w -e class network.ght.pocketshell.ScreenshotTest network.ght.pocketshell.test/androidx.test.runner.AndroidJUnitRunner | tee instrument-output.txt
            echo "==> PocketShellScreenshotTest logcat:"
            adb logcat -d -s PocketShellScreenshotTest:* || true
            echo "==> run-as visible files dir:"
            adb shell run-as network.ght.pocketshell ls -la /data/data/network.ght.pocketshell/files/ || true
            adb shell run-as network.ght.pocketshell sh -c 'cd /data/data/network.ght.pocketshell/files && tar cf /data/local/tmp/screenshots.tar screenshots'
            mkdir -p app/build/outputs/screenshots
            adb pull /data/local/tmp/screenshots.tar app/build/outputs/screenshots.tar
            tar xf app/build/outputs/screenshots.tar -C app/build/outputs/screenshots
            ls -la app/build/outputs/screenshots
            grep -q "OK (1 test)" instrument-output.txt

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pocketshell-screenshots
          path: app/build/outputs/screenshots
          if-no-files-found: error
